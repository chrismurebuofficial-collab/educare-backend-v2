<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduManager — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #155EEF;
    --blue-dark: #0B3FC4;
    --blue-pale: #EEF3FF;
    --ink: #101828;
    --gray: #667085;
    --border: #E4E7EC;
    --ok: #17805A;
    --err: #D92D20;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    background: #fff;
  }

  /* Header — PowerSchool-style top bar */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 1.25rem;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .logo .mark {
    width: 28px; height: 28px;
    background: var(--blue);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font-size: 0.85rem;
    font-weight: 800;
  }
  .logo span { color: var(--blue); }
  header .cta {
    background: var(--blue);
    color: #fff;
    border: none;
    padding: 0.55rem 1rem;
    border-radius: 7px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
  }

  /* Hero */
  .hero {
    padding: 2.4rem 1.25rem 1.6rem;
    text-align: left;
  }
  .hero h1 {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 2.1rem;
    line-height: 1.15;
    letter-spacing: -0.02em;
  }
  .hero h1 .accent { color: var(--blue); }
  .hero p {
    margin-top: 0.7rem;
    color: var(--gray);
    font-size: 0.95rem;
    max-width: 34ch;
    line-height: 1.5;
  }

  /* Card */
  main {
    padding: 0.5rem 1.25rem 3rem;
  }
  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(16,24,40,0.06);
    padding: 1.6rem;
    max-width: 440px;
    margin: 0 auto;
  }

  .roles {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    background: var(--blue-pale);
    border-radius: 9px;
    padding: 3px;
    margin-bottom: 1.4rem;
  }
  .role-btn {
    border: none;
    background: transparent;
    padding: 0.5rem 0.3rem;
    font-family: 'Inter', sans-serif;
    font-size: 0.74rem;
    font-weight: 600;
    color: var(--gray);
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .role-btn.active {
    background: #fff;
    color: var(--blue-dark);
    box-shadow: 0 1px 3px rgba(16,24,40,0.1);
  }

  .field { margin-bottom: 1.1rem; }
  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 0.4rem;
  }
  input {
    width: 100%;
    padding: 0.75rem 0.9rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px var(--blue-pale);
  }

  .row-between {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.4rem;
    font-size: 0.82rem;
  }
  .remember { display: flex; align-items: center; gap: 0.4rem; color: var(--gray); }
  .remember input { width: auto; }
  a.link { color: var(--blue); text-decoration: none; font-weight: 600; }
  a.link:hover { text-decoration: underline; }

  button[type="submit"] {
    width: 100%;
    padding: 0.85rem;
    border: none;
    border-radius: 8px;
    background: var(--blue);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  button[type="submit"]:hover { background: var(--blue-dark); }
  button[type="submit"]:active { transform: scale(0.99); }
  button[type="submit"]:disabled { opacity: 0.6; cursor: default; }

  .msg { margin-top: 0.9rem; font-size: 0.85rem; text-align: center; min-height: 1.1em; }
  .msg.error { color: var(--err); }
  .msg.ok { color: var(--ok); }

  footer {
    text-align: center;
    padding: 1.4rem;
    font-size: 0.78rem;
    color: var(--gray);
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

  <header>
    <div class="logo"><span class="mark">E</span>Edu<span>Manager</span></div>
    <button class="cta">Need Help?</button>
  </header>

  <section class="hero">
    <h1>Run Your School.<br><span class="accent">All in One Place.</span></h1>
    <p>Sign in to manage students, attendance, grades, fees, and more — built for admins, teachers, students, and parents.</p>
  </section>

  <main>
    <div class="card">
      <div class="roles" id="roleTabs">
        <button type="button" class="role-btn active" data-role="admin">Admin</button>
        <button type="button" class="role-btn" data-role="teacher">Teacher</button>
        <button type="button" class="role-btn" data-role="student">Student</button>
        <button type="button" class="role-btn" data-role="parent">Parent</button>
      </div>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@school.edu" required autocomplete="email">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <div class="row-between">
          <label class="remember">
            <input type="checkbox" id="remember">
            Keep me signed in
          </label>
          <a href="#" class="link">Forgot password?</a>
        </div>

        <button type="submit" id="loginBtn">Sign In</button>
        <p class="msg" id="msg"></p>
      </form>
    </div>
  </main>

  <footer>EduManager — School Management Platform</footer>

  <script>
    let selectedRole = 'admin';
    document.querySelectorAll('.role-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedRole = btn.dataset.role;
      });
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('msg');
      const btn = document.getElementById('loginBtn');

      msg.textContent = '';
      msg.className = 'msg';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          msg.textContent = data.error || 'Login failed';
          msg.classList.add('error');
          btn.disabled = false;
          btn.textContent = 'Sign In';
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('role', data.role);
        localStorage.setItem('name', data.name);

        msg.textContent = 'Signed in — redirecting…';
        msg.classList.add('ok');

        const redirects = {
          admin: '/admin-dashboard.html',
          teacher: '/teacher-dashboard.html',
          student: '/student-portal.html',
          parent: '/parent-portal.html'
        };
        window.location.href = redirects[data.role] || redirects[selectedRole];
      } catch (err) {
        msg.textContent = 'Could not reach the server';
        msg.classList.add('error');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>

</body>
</html>
