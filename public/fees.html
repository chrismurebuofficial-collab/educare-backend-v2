<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fees — EduManager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="brand">Edu<span class="accent">Manager</span></div>
    <nav>
      <a href="admin-dashboard.html">Dashboard</a>
      <a href="student-directory.html">Students</a>
      <a href="staff.html">Staff</a>
      <a href="attendance.html">Attendance</a>
      <a href="gradebook.html">Gradebook</a>
      <a href="fees.html" class="active">Fees</a>
      <a href="timetable.html">Timetable</a>
      <a href="announcements.html">Announcements</a>
    </nav>
    <div class="user-box">
      <div class="name" id="userName">—</div>
      <div class="role" id="userRole">—</div>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </aside>

  <main>
    <div class="page-header">
      <div>
        <h1>Fees</h1>
        <p class="sub">Track fee records and payment status</p>
      </div>
    </div>

    <div class="panel">
      <h2>Add Fee Record</h2>
      <form id="feeForm">
        <div class="form-grid">
          <div class="field">
            <label for="studentSelect">Student</label>
            <select id="studentSelect" required></select>
          </div>
          <div class="field">
            <label for="amount">Amount</label>
            <input type="number" id="amount" min="0" step="0.01" required>
          </div>
          <div class="field">
            <label for="dueDate">Due Date</label>
            <input type="date" id="dueDate">
          </div>
          <div class="field">
            <label for="status">Status</label>
            <select id="status">
              <option value="unpaid">Unpaid</option>
              <option value="partial">Partial</option>
              <option value="paid">Paid</option>
            </select>
          </div>
          <div class="field">
            <button type="submit" class="btn">Save Fee Record</button>
          </div>
        </div>
        <p class="msg" id="msg"></p>
      </form>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>Student</th><th>Amount</th><th>Due Date</th><th>Status</th></tr></thead>
        <tbody id="feeRows"><tr><td colspan="4" class="empty-state">Loading…</td></tr></tbody>
      </table>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login.html';
    document.getElementById('userName').textContent = localStorage.getItem('name') || '';
    document.getElementById('userRole').textContent = localStorage.getItem('role') || '';
    function logout() { localStorage.clear(); window.location.href = '/login.html'; }

    async function loadStudentOptions() {
      const res = await fetch('/api/students', { headers: { 'Authorization': `Bearer ${token}` } });
      const students = await res.json();
      const select = document.getElementById('studentSelect');
      select.innerHTML = students.map(s => `<option value="${s._id}">${s.name} (${s.admissionNumber})</option>`).join('');
    }

    async function loadFees() {
      const res = await fetch('/api/fees', { headers: { 'Authorization': `Bearer ${token}` } });
      const fees = await res.json();
      const rows = document.getElementById('feeRows');
      if (Array.isArray(fees) && fees.length) {
        rows.innerHTML = fees.map(f => `
          <tr>
            <td>${f.studentId?.name || 'Unknown'}</td>
            <td>${Number(f.amount).toFixed(2)}</td>
            <td>${f.dueDate ? new Date(f.dueDate).toLocaleDateString() : '—'}</td>
            <td><span class="badge ${f.status}">${f.status}</span></td>
          </tr>
        `).join('');
      } else {
        rows.innerHTML = '<tr><td colspan="4" class="empty-state">No fee records yet</td></tr>';
      }
    }

    document.getElementById('feeForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const body = {
        studentId: document.getElementById('studentSelect').value,
        amount: Number(document.getElementById('amount').value),
        dueDate: document.getElementById('dueDate').value,
        status: document.getElementById('status').value
      };
      const res = await fetch('/api/fees', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        msg.textContent = 'Fee record saved';
        msg.className = 'msg ok';
        e.target.reset();
        loadFees();
      } else {
        const data = await res.json();
        msg.textContent = data.error || 'Failed to save fee record';
        msg.className = 'msg error';
      }
    });

    loadStudentOptions();
    loadFees();
  </script>

</body>
</html>
