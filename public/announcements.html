<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Announcements — EduManager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="brand">Edu<span class="accent">Manager</span></div>
    <nav>
      <a href="admin-dashboard.html">Dashboard</a>
      <a href="student-directory.html">Students</a>
      <a href="staff.html">Staff</a>
      <a href="attendance.html">Attendance</a>
      <a href="gradebook.html">Gradebook</a>
      <a href="fees.html">Fees</a>
      <a href="timetable.html">Timetable</a>
      <a href="announcements.html" class="active">Announcements</a>
    </nav>
    <div class="user-box">
      <div class="name" id="userName">—</div>
      <div class="role" id="userRole">—</div>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </aside>

  <main>
    <div class="page-header">
      <div>
        <h1>Announcements</h1>
        <p class="sub">Post updates for the whole school or specific roles</p>
      </div>
    </div>

    <div class="panel" id="postPanel">
      <h2>Post Announcement</h2>
      <form id="announcementForm">
        <div class="form-grid">
          <div class="field">
            <label for="title">Title</label>
            <input type="text" id="title" required>
          </div>
          <div class="field">
            <label for="audience">Audience</label>
            <select id="audience">
              <option value="all">Everyone</option>
              <option value="admin">Admins</option>
              <option value="teacher">Teachers</option>
              <option value="student">Students</option>
              <option value="parent">Parents</option>
            </select>
          </div>
          <div class="field" style="grid-column: 1 / -1;">
            <label for="message">Message</label>
            <textarea id="message" rows="3" required></textarea>
          </div>
          <div class="field">
            <button type="submit" class="btn">Post</button>
          </div>
        </div>
        <p class="msg" id="msg"></p>
      </form>
    </div>

    <div class="panel">
      <h2>Feed</h2>
      <div id="feed"><p class="empty-state">Loading…</p></div>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    if (!token) window.location.href = '/login.html';
    document.getElementById('userName').textContent = localStorage.getItem('name') || '';
    document.getElementById('userRole').textContent = role || '';
    function logout() { localStorage.clear(); window.location.href = '/login.html'; }

    // Only admin/teacher can post — hide the form for others
    if (role !== 'admin' && role !== 'teacher') {
      document.getElementById('postPanel').style.display = 'none';
    }

    async function loadAnnouncements() {
      const res = await fetch('/api/announcements', { headers: { 'Authorization': `Bearer ${token}` } });
      const announcements = await res.json();
      const feed = document.getElementById('feed');
      if (Array.isArray(announcements) && announcements.length) {
        feed.innerHTML = announcements.map(a => `
          <div style="padding:0.9rem 0; border-bottom:1px solid var(--border);">
            <div style="display:flex; justify-content:space-between; align-items:baseline; gap:0.6rem;">
              <strong style="font-family:'Manrope',sans-serif; font-size:1.02rem;">${a.title}</strong>
              <span style="font-size:0.72rem; color:var(--gray-600); text-transform:capitalize;">${a.audience} · ${new Date(a.date).toLocaleDateString()}</span>
            </div>
            <p style="font-size:0.88rem; margin-top:0.35rem; color:var(--ink);">${a.message}</p>
          </div>
        `).join('');
      } else {
        feed.innerHTML = '<p class="empty-state">No announcements yet</p>';
      }
    }

    document.getElementById('announcementForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const body = {
        title: document.getElementById('title').value,
        message: document.getElementById('message').value,
        audience: document.getElementById('audience').value
      };
      const res = await fetch('/api/announcements', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        msg.textContent = 'Announcement posted';
        msg.className = 'msg ok';
        e.target.reset();
        loadAnnouncements();
      } else {
        const data = await res.json();
        msg.textContent = data.error || 'Failed to post';
        msg.className = 'msg error';
      }
    });

    loadAnnouncements();
  </script>

</body>
</html>
