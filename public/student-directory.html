<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students — EduManager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="brand">Edu<span class="accent">Manager</span></div>
    <nav>
      <a href="admin-dashboard.html">Dashboard</a>
      <a href="student-directory.html" class="active">Students</a>
      <a href="staff.html">Staff</a>
      <a href="attendance.html">Attendance</a>
      <a href="gradebook.html">Gradebook</a>
      <a href="fees.html">Fees</a>
      <a href="timetable.html">Timetable</a>
      <a href="announcements.html">Announcements</a>
    </nav>
    <div class="user-box">
      <div class="name" id="userName">—</div>
      <div class="role" id="userRole">—</div>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </aside>

  <main>
    <div class="page-header">
      <div>
        <h1>Student Directory</h1>
        <p class="sub">Manage enrolled students</p>
      </div>
    </div>

    <div class="panel">
      <h2>Add Student</h2>
      <form id="studentForm">
        <div class="form-grid">
          <div class="field">
            <label for="name">Full Name</label>
            <input type="text" id="name" required>
          </div>
          <div class="field">
            <label for="admissionNumber">Admission No.</label>
            <input type="text" id="admissionNumber" required>
          </div>
          <div class="field">
            <label for="className">Class</label>
            <input type="text" id="className" placeholder="e.g. Grade 5">
          </div>
          <div class="field">
            <label for="guardianName">Guardian Name</label>
            <input type="text" id="guardianName">
          </div>
          <div class="field">
            <label for="guardianContact">Guardian Contact</label>
            <input type="text" id="guardianContact">
          </div>
          <div class="field">
            <button type="submit" class="btn">Add Student</button>
          </div>
        </div>
        <p class="msg" id="msg"></p>
      </form>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>Name</th><th>Admission No.</th><th>Class</th><th>Guardian</th><th>Contact</th></tr></thead>
        <tbody id="studentRows"><tr><td colspan="5" class="empty-state">Loading…</td></tr></tbody>
      </table>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login.html';
    document.getElementById('userName').textContent = localStorage.getItem('name') || '';
    document.getElementById('userRole').textContent = localStorage.getItem('role') || '';
    function logout() { localStorage.clear(); window.location.href = '/login.html'; }

    async function loadStudents() {
      const res = await fetch('/api/students', { headers: { 'Authorization': `Bearer ${token}` } });
      const students = await res.json();
      const rows = document.getElementById('studentRows');
      if (Array.isArray(students) && students.length) {
        rows.innerHTML = students.map(s => `
          <tr>
            <td>${s.name}</td>
            <td>${s.admissionNumber}</td>
            <td>${s.className || '—'}</td>
            <td>${s.guardianName || '—'}</td>
            <td>${s.guardianContact || '—'}</td>
          </tr>
        `).join('');
      } else {
        rows.innerHTML = '<tr><td colspan="5" class="empty-state">No students yet — add your first one above</td></tr>';
      }
    }

    document.getElementById('studentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const body = {
        name: document.getElementById('name').value,
        admissionNumber: document.getElementById('admissionNumber').value,
        className: document.getElementById('className').value,
        guardianName: document.getElementById('guardianName').value,
        guardianContact: document.getElementById('guardianContact').value
      };
      const res = await fetch('/api/students', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        msg.textContent = 'Student added';
        msg.className = 'msg ok';
        e.target.reset();
        loadStudents();
      } else {
        const data = await res.json();
        msg.textContent = data.error || 'Failed to add student';
        msg.className = 'msg error';
      }
    });

    loadStudents();
  </script>

</body>
</html>
