<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timetable — EduManager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="brand">Edu<span class="accent">Manager</span></div>
    <nav>
      <a href="admin-dashboard.html">Dashboard</a>
      <a href="student-directory.html">Students</a>
      <a href="staff.html">Staff</a>
      <a href="attendance.html">Attendance</a>
      <a href="gradebook.html">Gradebook</a>
      <a href="fees.html">Fees</a>
      <a href="timetable.html" class="active">Timetable</a>
      <a href="announcements.html">Announcements</a>
    </nav>
    <div class="user-box">
      <div class="name" id="userName">—</div>
      <div class="role" id="userRole">—</div>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </aside>

  <main>
    <div class="page-header">
      <div>
        <h1>Timetable</h1>
        <p class="sub">Class schedule by day and period</p>
      </div>
    </div>

    <div class="panel">
      <h2>Add Timetable Entry</h2>
      <form id="timetableForm">
        <div class="form-grid">
          <div class="field">
            <label for="className">Class</label>
            <input type="text" id="className" placeholder="e.g. Grade 5" required>
          </div>
          <div class="field">
            <label for="day">Day</label>
            <select id="day" required>
              <option>Monday</option>
              <option>Tuesday</option>
              <option>Wednesday</option>
              <option>Thursday</option>
              <option>Friday</option>
            </select>
          </div>
          <div class="field">
            <label for="period">Period</label>
            <input type="text" id="period" placeholder="e.g. Period 1 (8:00-8:45)" required>
          </div>
          <div class="field">
            <label for="subject">Subject</label>
            <input type="text" id="subject">
          </div>
          <div class="field">
            <label for="room">Room</label>
            <input type="text" id="room">
          </div>
          <div class="field">
            <button type="submit" class="btn">Save Entry</button>
          </div>
        </div>
        <p class="msg" id="msg"></p>
      </form>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>Class</th><th>Day</th><th>Period</th><th>Subject</th><th>Room</th></tr></thead>
        <tbody id="timetableRows"><tr><td colspan="5" class="empty-state">Loading…</td></tr></tbody>
      </table>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login.html';
    document.getElementById('userName').textContent = localStorage.getItem('name') || '';
    document.getElementById('userRole').textContent = localStorage.getItem('role') || '';
    function logout() { localStorage.clear(); window.location.href = '/login.html'; }

    async function loadTimetable() {
      const res = await fetch('/api/timetable', { headers: { 'Authorization': `Bearer ${token}` } });
      const entries = await res.json();
      const rows = document.getElementById('timetableRows');
      if (Array.isArray(entries) && entries.length) {
        rows.innerHTML = entries.map(t => `
          <tr>
            <td>${t.className}</td>
            <td>${t.day}</td>
            <td>${t.period}</td>
            <td>${t.subject || '—'}</td>
            <td>${t.room || '—'}</td>
          </tr>
        `).join('');
      } else {
        rows.innerHTML = '<tr><td colspan="5" class="empty-state">No timetable entries yet</td></tr>';
      }
    }

    document.getElementById('timetableForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const body = {
        className: document.getElementById('className').value,
        day: document.getElementById('day').value,
        period: document.getElementById('period').value,
        subject: document.getElementById('subject').value,
        room: document.getElementById('room').value
      };
      const res = await fetch('/api/timetable', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        msg.textContent = 'Entry saved';
        msg.className = 'msg ok';
        e.target.reset();
        loadTimetable();
      } else {
        const data = await res.json();
        msg.textContent = data.error || 'Failed to save entry';
        msg.className = 'msg error';
      }
    });

    loadTimetable();
  </script>

</body>
</html>
