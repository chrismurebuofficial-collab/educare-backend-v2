<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradebook — EduManager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="brand">Edu<span class="accent">Manager</span></div>
    <nav>
      <a href="admin-dashboard.html">Dashboard</a>
      <a href="student-directory.html">Students</a>
      <a href="staff.html">Staff</a>
      <a href="attendance.html">Attendance</a>
      <a href="gradebook.html" class="active">Gradebook</a>
      <a href="fees.html">Fees</a>
      <a href="timetable.html">Timetable</a>
      <a href="announcements.html">Announcements</a>
    </nav>
    <div class="user-box">
      <div class="name" id="userName">—</div>
      <div class="role" id="userRole">—</div>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </aside>

  <main>
    <div class="page-header">
      <div>
        <h1>Gradebook</h1>
        <p class="sub">Record and review exam scores</p>
      </div>
    </div>

    <div class="panel">
      <h2>Add Grade</h2>
      <form id="gradeForm">
        <div class="form-grid">
          <div class="field">
            <label for="studentSelect">Student</label>
            <select id="studentSelect" required></select>
          </div>
          <div class="field">
            <label for="subject">Subject</label>
            <input type="text" id="subject" required>
          </div>
          <div class="field">
            <label for="examType">Exam Type</label>
            <input type="text" id="examType" placeholder="e.g. Midterm">
          </div>
          <div class="field">
            <label for="score">Score</label>
            <input type="number" id="score" min="0" max="100" required>
          </div>
          <div class="field">
            <label for="term">Term</label>
            <input type="text" id="term" placeholder="e.g. Term 2">
          </div>
          <div class="field">
            <button type="submit" class="btn">Save Grade</button>
          </div>
        </div>
        <p class="msg" id="msg"></p>
      </form>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>Student</th><th>Subject</th><th>Exam Type</th><th>Score</th><th>Term</th></tr></thead>
        <tbody id="gradeRows"><tr><td colspan="5" class="empty-state">Loading…</td></tr></tbody>
      </table>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login.html';
    document.getElementById('userName').textContent = localStorage.getItem('name') || '';
    document.getElementById('userRole').textContent = localStorage.getItem('role') || '';
    function logout() { localStorage.clear(); window.location.href = '/login.html'; }

    async function loadStudentOptions() {
      const res = await fetch('/api/students', { headers: { 'Authorization': `Bearer ${token}` } });
      const students = await res.json();
      const select = document.getElementById('studentSelect');
      select.innerHTML = students.map(s => `<option value="${s._id}">${s.name} (${s.admissionNumber})</option>`).join('');
    }

    async function loadGrades() {
      const res = await fetch('/api/grades', { headers: { 'Authorization': `Bearer ${token}` } });
      const grades = await res.json();
      const rows = document.getElementById('gradeRows');
      if (Array.isArray(grades) && grades.length) {
        rows.innerHTML = grades.map(g => `
          <tr>
            <td>${g.studentId?.name || 'Unknown'}</td>
            <td>${g.subject}</td>
            <td>${g.examType || '—'}</td>
            <td>${g.score}</td>
            <td>${g.term || '—'}</td>
          </tr>
        `).join('');
      } else {
        rows.innerHTML = '<tr><td colspan="5" class="empty-state">No grades recorded yet</td></tr>';
      }
    }

    document.getElementById('gradeForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const body = {
        studentId: document.getElementById('studentSelect').value,
        subject: document.getElementById('subject').value,
        examType: document.getElementById('examType').value,
        score: Number(document.getElementById('score').value),
        term: document.getElementById('term').value
      };
      const res = await fetch('/api/grades', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        msg.textContent = 'Grade saved';
        msg.className = 'msg ok';
        e.target.reset();
        loadGrades();
      } else {
        const data = await res.json();
        msg.textContent = data.error || 'Failed to save grade';
        msg.className = 'msg error';
      }
    });

    loadStudentOptions();
    loadGrades();
  </script>

</body>
</html>
