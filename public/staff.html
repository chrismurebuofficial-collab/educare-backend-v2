<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff — EduManager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="brand">Edu<span class="accent">Manager</span></div>
    <nav>
      <a href="admin-dashboard.html">Dashboard</a>
      <a href="student-directory.html">Students</a>
      <a href="staff.html" class="active">Staff</a>
      <a href="attendance.html">Attendance</a>
      <a href="gradebook.html">Gradebook</a>
      <a href="fees.html">Fees</a>
      <a href="timetable.html">Timetable</a>
      <a href="announcements.html">Announcements</a>
    </nav>
    <div class="user-box">
      <div class="name" id="userName">—</div>
      <div class="role" id="userRole">—</div>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </aside>

  <main>
    <div class="page-header">
      <div>
        <h1>Staff</h1>
        <p class="sub">Manage admin and teacher accounts</p>
      </div>
    </div>

    <div class="panel">
      <h2>Add Staff Account</h2>
      <form id="staffForm">
        <div class="form-grid">
          <div class="field">
            <label for="name">Full Name</label>
            <input type="text" id="name" required>
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" required>
          </div>
          <div class="field">
            <label for="password">Temporary Password</label>
            <input type="text" id="password" required minlength="6">
          </div>
          <div class="field">
            <label for="role">Role</label>
            <select id="role">
              <option value="teacher">Teacher</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="field">
            <button type="submit" class="btn">Add Staff</button>
          </div>
        </div>
        <p class="msg" id="msg"></p>
      </form>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th></tr></thead>
        <tbody id="staffRows"><tr><td colspan="4" class="empty-state">Loading…</td></tr></tbody>
      </table>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login.html';
    document.getElementById('userName').textContent = localStorage.getItem('name') || '';
    document.getElementById('userRole').textContent = localStorage.getItem('role') || '';
    function logout() { localStorage.clear(); window.location.href = '/login.html'; }

    async function loadStaff() {
      const res = await fetch('/api/admin/users', { headers: { 'Authorization': `Bearer ${token}` } });
      const rows = document.getElementById('staffRows');
      if (!res.ok) {
        rows.innerHTML = '<tr><td colspan="4" class="empty-state">Could not load staff — admin access required</td></tr>';
        return;
      }
      const staff = await res.json();
      if (Array.isArray(staff) && staff.length) {
        rows.innerHTML = staff.map(u => `
          <tr>
            <td>${u.name}</td>
            <td>${u.email}</td>
            <td style="text-transform:capitalize"><span class="badge ${u.role === 'admin' ? 'paid' : 'late'}">${u.role}</span></td>
            <td>${new Date(u.createdAt).toLocaleDateString()}</td>
          </tr>
        `).join('');
      } else {
        rows.innerHTML = '<tr><td colspan="4" class="empty-state">No staff accounts yet — add one above</td></tr>';
      }
    }

    document.getElementById('staffForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const body = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        role: document.getElementById('role').value
      };
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        msg.textContent = 'Staff account created';
        msg.className = 'msg ok';
        e.target.reset();
        loadStaff();
      } else {
        const data = await res.json();
        msg.textContent = data.error || 'Failed to create account';
        msg.className = 'msg error';
      }
    });

    loadStaff();
  </script>

</body>
</html>
