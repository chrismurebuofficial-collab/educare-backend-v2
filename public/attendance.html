<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance — EduManager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="brand">Edu<span class="accent">Manager</span></div>
    <nav>
      <a href="admin-dashboard.html">Dashboard</a>
      <a href="student-directory.html">Students</a>
      <a href="staff.html">Staff</a>
      <a href="attendance.html" class="active">Attendance</a>
      <a href="gradebook.html">Gradebook</a>
      <a href="fees.html">Fees</a>
      <a href="timetable.html">Timetable</a>
      <a href="announcements.html">Announcements</a>
    </nav>
    <div class="user-box">
      <div class="name" id="userName">—</div>
      <div class="role" id="userRole">—</div>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </aside>

  <main>
    <div class="page-header">
      <div>
        <h1>Attendance</h1>
        <p class="sub">Mark and review daily attendance</p>
      </div>
    </div>

    <div class="panel">
      <h2>Mark Attendance</h2>
      <form id="attendanceForm">
        <div class="form-grid">
          <div class="field">
            <label for="studentSelect">Student</label>
            <select id="studentSelect" required></select>
          </div>
          <div class="field">
            <label for="date">Date</label>
            <input type="date" id="date" required>
          </div>
          <div class="field">
            <label for="status">Status</label>
            <select id="status" required>
              <option value="present">Present</option>
              <option value="absent">Absent</option>
              <option value="late">Late</option>
            </select>
          </div>
          <div class="field">
            <button type="submit" class="btn">Save</button>
          </div>
        </div>
        <p class="msg" id="msg"></p>
      </form>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>Student</th><th>Date</th><th>Status</th></tr></thead>
        <tbody id="attendanceRows"><tr><td colspan="3" class="empty-state">Loading…</td></tr></tbody>
      </table>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login.html';
    document.getElementById('userName').textContent = localStorage.getItem('name') || '';
    document.getElementById('userRole').textContent = localStorage.getItem('role') || '';
    function logout() { localStorage.clear(); window.location.href = '/login.html'; }

    document.getElementById('date').valueAsDate = new Date();

    async function loadStudentOptions() {
      const res = await fetch('/api/students', { headers: { 'Authorization': `Bearer ${token}` } });
      const students = await res.json();
      const select = document.getElementById('studentSelect');
      select.innerHTML = students.map(s => `<option value="${s._id}">${s.name} (${s.admissionNumber})</option>`).join('');
    }

    async function loadAttendance() {
      const res = await fetch('/api/attendance', { headers: { 'Authorization': `Bearer ${token}` } });
      const records = await res.json();
      const rows = document.getElementById('attendanceRows');
      if (Array.isArray(records) && records.length) {
        rows.innerHTML = records.map(r => `
          <tr>
            <td>${r.studentId?.name || 'Unknown'}</td>
            <td>${new Date(r.date).toLocaleDateString()}</td>
            <td><span class="badge ${r.status}">${r.status}</span></td>
          </tr>
        `).join('');
      } else {
        rows.innerHTML = '<tr><td colspan="3" class="empty-state">No attendance records yet</td></tr>';
      }
    }

    document.getElementById('attendanceForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const body = {
        studentId: document.getElementById('studentSelect').value,
        date: document.getElementById('date').value,
        status: document.getElementById('status').value
      };
      const res = await fetch('/api/attendance', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        msg.textContent = 'Attendance saved';
        msg.className = 'msg ok';
        loadAttendance();
      } else {
        const data = await res.json();
        msg.textContent = data.error || 'Failed to save';
        msg.className = 'msg error';
      }
    });

    loadStudentOptions();
    loadAttendance();
  </script>

</body>
</html>
